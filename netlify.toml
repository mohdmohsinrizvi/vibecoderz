# Netlify Configuration File

[build]
  # The directory where Netlify will look for package.json and run the build command
  base = "vibecoders-app"
  
  # The directory that Netlify will serve (relative to the base directory)
  publish = "dist"
  
  # The command Netlify will execute to build the application
  command = "npm run build"

# Redirect rules to support React Router client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and cache header controls
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  # Cache Vite compiled production bundles (hashed assets) forever
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Never cache the root index page so users always get active builds instantly
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
